name: CI Build
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build Nuxt App
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Nuxt
        run: pnpm build

      - name: Verify build output exists
        run: |
          test -d .output || (echo "Build output not found" && exit 1)
